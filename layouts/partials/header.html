<header class="site-header" role="banner">
  <div class="container">
    <div class="header-content">
      <div class="header-leading">
        <!-- 移动端菜单按钮 -->
        <button
          class="mobile-menu-toggle"
          type="button"
          aria-expanded="false"
          aria-controls="mobile-menu"
          aria-label="打开导航菜单">
          <div class="menu-toggle-icon">
            <svg class="menu-icon" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <line x1="3" y1="6" x2="21" y2="6"></line>
              <line x1="3" y1="12" x2="21" y2="12"></line>
              <line x1="3" y1="18" x2="21" y2="18"></line>
            </svg>
            <svg class="close-icon" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <line x1="18" y1="6" x2="6" y2="18"></line>
              <line x1="6" y1="6" x2="18" y2="18"></line>
            </svg>
          </div>
        </button>

        <!-- 网站标题 -->
        <div class="site-branding">
          {{ if .Site.Params.logo }}
            <a href="{{ "/" | relLangURL }}" class="site-logo">
              <img src="{{ .Site.Params.logo | relURL }}" alt="{{ .Site.Title }}" width="40" height="40">
            </a>
          {{ end }}

          <div class="site-title-wrapper">
            <h1 class="site-title">
              <a href="{{ "/" | relLangURL }}" rel="home">{{ .Site.Title }}</a>
            </h1>

            {{ if .Site.Params.tagline }}
              <p class="site-tagline">{{ .Site.Params.tagline }}</p>
            {{ end }}
          </div>
        </div>
      </div>

      <div class="header-center">
        <!-- 动态标题 -->
        <div class="dynamic-header" id="dynamic-header" aria-live="polite" aria-atomic="true">
          <h2 class="dynamic-title" id="dynamic-title"></h2>
        </div>

        <!-- 桌面端导航菜单 -->
        <nav class="desktop-navigation" role="navigation" aria-label="主导航">
          <ul class="primary-menu">
            {{ range .Site.Menus.main }}
              <li class="menu-item{{ if $.IsMenuCurrent "main" . }} current-menu-item{{ end }}">
                <a href="{{ .URL | relLangURL }}"{{ if .Title }} title="{{ .Title }}"{{ end }}>
                  {{ .Name }}
                </a>
              </li>
            {{ end }}
          </ul>
        </nav>
      </div>

      <!-- 搜索按钮 -->
      <div class="header-actions">
        {{ if .Site.Params.search }}
          <div class="search-container" role="search">
            <button class="search-toggle" type="button" aria-label="打开搜索" aria-expanded="false" aria-controls="header-search-form">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="11" cy="11" r="8"></circle>
                <path d="m21 21-4.35-4.35"></path>
              </svg>
            </button>
            <form class="search-form" id="header-search-form" action="{{ "/search/" | relLangURL }}" method="GET">
              <input 
                type="text" 
                name="q" 
                class="search-input" 
                placeholder="搜索..." 
                value="{{ .Params.searchQuery | default "" }}"
                aria-label="搜索输入框"
              >
            </form>
          </div>
        {{ end }}
      </div>
    </div>

    <!-- 移动端折叠菜单 -->
    <nav class="mobile-navigation" id="mobile-menu" role="navigation" aria-label="移动端导航" aria-hidden="true">
      <ul class="mobile-primary-menu">
        {{ range .Site.Menus.main }}
          <li class="menu-item{{ if $.IsMenuCurrent "main" . }} current-menu-item{{ end }}">
            <a href="{{ .URL | relLangURL }}"{{ if .Title }} title="{{ .Title }}"{{ end }}>
              {{ .Name }}
            </a>
          </li>
        {{ end }}
      </ul>
      
    </nav>
  </div>
</header>
