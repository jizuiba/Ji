<!-- Preload Critical Resources -->
{{ if .Site.Params.preloadFonts }}
  {{ range .Site.Params.preloadFonts }}
    <link rel="preload" href="{{ .url }}" as="font" type="font/woff2" crossorigin>
  {{ end }}
{{ end }}

<!-- Critical JavaScript -->
<script>
  // Theme detection and initialization
  (function() {
    'use strict';

    // Remove no-js class
    document.documentElement.classList.remove('no-js');
    window.__JI_SITE_ROOT__ = {{ "/" | relLangURL | jsonify | safeJS }};
  })();
</script>

<!-- Service Worker Registration -->
{{ if .Site.Params.serviceWorker }}
<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', function() {
      const siteRoot = window.__JI_SITE_ROOT__ || '/';
      const normalizedRoot = siteRoot.endsWith('/') ? siteRoot : siteRoot + '/';
      const swUrl = new URL(normalizedRoot.replace(/\/$/, '') + '/sw.js', window.location.origin);

      navigator.serviceWorker.register(swUrl.toString(), {
        scope: normalizedRoot
      }).catch(function() {
        // no-op
      });
    });
  }
</script>
{{ end }}
