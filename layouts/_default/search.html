{{ define "main" }}
<div class="posts-list">
  <div class="container">
    <header class="page-header">
      <h1 class="page-title" id="search-title">搜索</h1>
      <p class="page-subtitle" id="search-subtitle" style="display: none;"></p>
    </header>
    
    <div id="search-results-container" aria-live="polite">
      <noscript>
        <div class="no-posts">
          <p>请启用 JavaScript 以使用站内搜索。</p>
        </div>
      </noscript>
    </div>
    
    <!-- 分页组件 -->
    <div id="search-pagination" style="display: none;"></div>
  </div>
</div>
{{ end }}
